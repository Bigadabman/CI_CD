<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab 11 CI/CD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="intro" aria-labelledby="page-title">
      <p class="label">Лабораторная работа 11</p>
      <h1 id="page-title">Заявка на консультацию</h1>
      <p class="lead">Простая веб-страница для демонстрации CI/CD, Selenium-тестов и публикации через GitHub Pages.</p>
    </section>

    <section class="form-panel" aria-label="Форма заявки">
      <form id="request-form">
        <label for="name">Имя</label>
        <input id="name" name="name" type="text" placeholder="Анна Иванова" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="student@example.com" required>

        <label for="direction">Направление</label>
        <select id="direction" name="direction" required>
          <option value="">Выберите направление</option>
          <option value="frontend">Frontend</option>
          <option value="backend">Backend</option>
          <option value="testing">Тестирование</option>
        </select>

        <label for="comment">Комментарий</label>
        <textarea id="comment" name="comment" rows="4" placeholder="Коротко опишите вопрос"></textarea>

        <div class="actions">
          <button id="submit-button" type="submit">Отправить заявку</button>
          <button id="reset-button" type="reset">Очистить</button>
        </div>
      </form>

      <p id="result" class="result" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
